# Minimal nginx config for serving a Vite-built SPA as a non-root user.
# Routing-aware (SPA try_files) and reverse-proxy blocks are deliberately
# NOT included here — those land later via frontend-patterns / docker-patterns
# guidance when a frontend route or backend call first ships.

pid /tmp/nginx.pid;

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  # Logs to stdout/stderr so docker captures them.
  access_log /dev/stdout;
  error_log  /dev/stderr;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
  }
}
